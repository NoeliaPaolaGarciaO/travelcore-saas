<div class="box">

    <input id="cuitProveedor" placeholder="CUIT">

<select id="selectProveedorCuenta"></select>

<input id="cbu" placeholder="CBU">

<button onclick="crearCuenta()">Agregar Cuenta</button>

<div id="listaCuentas"></div>

<h2>Listado</h2>
